# BEGIN_KITTY_FONTS
font_family      family='Maple Mono NF CN' style=Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
# https://sw.kovidgoyal.net/kitty/faq/#kitty-is-not-able-to-use-my-favorite-font
# Nerd Fonts v3.4.0
symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# 字号快捷键
map kitty_mod+backspace change_font_size current 0
map kitty_mod++ change_font_size current +1.0
map kitty_mod+= change_font_size current +1.0
map kitty_mod+- change_font_size current -1.0

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# 背景设置
background_opacity 0.8
dynamic_background_opacity yes
# 背景色以外的透明颜色, 动态调整不透明度时不受影响
transparent_background_colors #313244@0.9

# beam=竖线, block=方块(默认), underline=下划线
cursor_shape      beam
# 光标动画
cursor_trail    1
#cursor_blink_interval -1 ease-in-out
# 为什么还是无法阻止claude让我光标变成块状。。
shell_integration no-cursor

# tab bar
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted

scrollbar always

show_hyperlink_targets ctrl

#modify_font cell_height -2px

remember_window_size  no
initial_window_width  1120
initial_window_height 700
